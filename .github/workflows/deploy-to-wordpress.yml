name: 🥋 Deploy Panamerican Taekwondo Academy to WordPress

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 📦 Install Dependencies
      run: |
        npm install -g sass
        npm install -g uglify-js
        npm install -g html-minifier
        
    - name: 🎨 Build CSS from SASS
      run: |
        if [ -f "src/scss/style.scss" ]; then
          sass src/scss/style.scss src/css/style.css --style compressed
        fi
        
    - name: 📝 Minify JavaScript
      run: |
        if [ -f "src/js/main.js" ]; then
          uglifyjs src/js/main.js -o src/js/main.min.js -c -m
        fi
        
    - name: 🗜️ Minify HTML
      run: |
        if [ -f "src/index.html" ]; then
          html-minifier --collapse-whitespace --remove-comments --minify-css --minify-js src/index.html -o src/index.min.html
        fi
        
    - name: 🚀 Deploy to WordPress via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./src/
        server-dir: /public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/*wordpress*
          **/*WordPress*
          **/*WORDPRESS*
          **/*wp-*
          **/*WP-*
          **/wp-*
          **/WP-*
          **/*.wp
          **/*.WP
          **/wordpress/**
          **/WordPress/**
          **/WORDPRESS/**
          
    - name: 📧 Notify Academy Team
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#taekwondo-deployments'
        username: 'GitHub Actions'
        icon_emoji: ':martial_arts_uniform:'
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          🥋 Panamerican Taekwondo Academy Deployment Status: ${{ job.status }}
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          
          ${{ job.status == 'success' && '✅ Website deployed successfully!' || '❌ Deployment failed!' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
